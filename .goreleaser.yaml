version: 2

project_name: openzro
builds:
  - id: openzro
    dir: client
    binary: openzro
    env: [CGO_ENABLED=0]
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - arm
      - amd64
      - arm64
      - 386
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: 386
    ldflags:
      # selfupdate.buildTeamID (#5): pins the macOS self-update to
      # openZro's Apple Team ID. `index .Env` (not `.Env.X`) so a
      # build without the secret gets "" rather than failing — empty
      # => the daemon's Verify is fail-closed (no self-update), which
      # is correct for non-release / non-macOS builds.
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser -X github.com/openzro/openzro/version/selfupdate.buildTeamID={{ if index .Env "APPLE_TEAM_ID" }}{{ .Env.APPLE_TEAM_ID }}{{ end }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags:
      - load_wgnt_from_rsrc

  - id: openzro-static
    dir: client
    binary: openzro
    env: [CGO_ENABLED=0]
    goos:
      - linux
    goarch:
      - mips
      - mipsle
      - mips64
      - mips64le
    gomips:
      - hardfloat
      - softfloat
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags:
      - load_wgnt_from_rsrc

  - id: openzro-mgmt
    dir: management
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Runtime.Goos "linux" }}
          {{- if eq .Arch "arm64"}}CC=aarch64-linux-gnu-gcc{{- end }}
          {{- if eq .Arch "arm"}}CC=arm-linux-gnueabihf-gcc{{- end }}
        {{- end }}
    binary: openzro-mgmt
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"
    # archive_duckdb pulls in github.com/marcboeker/go-duckdb (CGo)
    # so the management binary can read the cold-archive Parquet
    # bucket configured via OPENZRO_FLOW_ARCHIVE_S3_BUCKET /
    # OPENZRO_FLOW_ARCHIVE_GCS_BUCKET. Without the tag, the
    # federated read path falls back to hot-only and the dashboard
    # cannot reach events older than OPENZRO_FLOW_RETENTION. CGO_ENABLED
    # is already on for this build, so the only cost is +~30MB of
    # embedded engine. See ADR-0012.
    tags:
      - archive_duckdb

  - id: openzro-signal
    dir: signal
    env: [CGO_ENABLED=0]
    binary: openzro-signal
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: openzro-relay
    dir: relay
    env: [CGO_ENABLED=0]
    binary: openzro-relay
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: openzro-upload
    dir: upload-server
    env: [CGO_ENABLED=0]
    binary: openzro-upload
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

universal_binaries:
  - id: openzro

archives:
  - builds:
      - openzro
      - openzro-static

nfpms:
  - maintainer: Openzro <dev@openzro.io>
    description: Openzro client.
    homepage: https://openzro.io/
    id: openzro-deb
    bindir: /usr/bin
    builds:
      - openzro
    formats:
      - deb

    scripts:
      postinstall: "release_files/post_install.sh"
      preremove: "release_files/pre_remove.sh"

  - maintainer: Openzro <dev@openzro.io>
    description: Openzro client.
    homepage: https://openzro.io/
    id: openzro-rpm
    bindir: /usr/bin
    builds:
      - openzro
    formats:
      - rpm

    scripts:
      postinstall: "release_files/post_install.sh"
      preremove: "release_files/pre_remove.sh"
