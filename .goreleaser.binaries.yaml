# Simplified GoReleaser config for testing-stage releases.
#
# Compared to .goreleaser.yaml (the full upstream-derived config):
#   - No Docker Hub push (only ghcr.io, which uses GITHUB_TOKEN).
#   - No apt/yum repo upload to wiretrustee.com (defunct domain) —
#     ours go to pkg.openzro.io via scripts/publish-packages.sh.
#   - No code signing (Windows / macOS unsigned — alpha/beta only;
#     SignPath EV + Apple Dev ID tracked as ADR-0007 Phase 2).
#   - No goreleaser-pro features.
#   - .deb / .rpm packages still produced and attached to the GitHub
#     Release as plain downloadable artifacts.
#   - Homebrew tap push to openzro/homebrew-tap (Stage 5 of ADR-0007)
#     gated on the HOMEBREW_TAP_TOKEN secret being set.
#
# Use this config until we either (a) get OSS signing through
# SignPath / Certum, or (b) decide to ship to a managed apt/yum
# host (Cloudsmith free OSS plan is the pre-decided path).

version: 2

project_name: openzro

builds:
  - id: openzro
    dir: client
    binary: openzro
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64, arm, "386"]
    ignore:
      - { goos: windows, goarch: arm64 }
      - { goos: windows, goarch: arm }
      - { goos: windows, goarch: "386" }
      - { goos: darwin,  goarch: arm }
      - { goos: darwin,  goarch: "386" }
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags:
      - load_wgnt_from_rsrc

  - id: openzro-mgmt
    dir: management
    binary: openzro-mgmt
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: openzro-signal
    dir: signal
    binary: openzro-signal
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: openzro-relay
    dir: relay
    binary: openzro-relay
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: openzro-upload
    dir: upload-server
    binary: openzro-upload
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: client
    builds: [openzro]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

  - id: openzro-mgmt
    builds: [openzro-mgmt]
    name_template: >-
      openzro-mgmt_{{ .Version }}_{{ .Os }}_{{ .Arch }}

  - id: openzro-signal
    builds: [openzro-signal]
    name_template: >-
      openzro-signal_{{ .Version }}_{{ .Os }}_{{ .Arch }}

  - id: openzro-relay
    builds: [openzro-relay]
    name_template: >-
      openzro-relay_{{ .Version }}_{{ .Os }}_{{ .Arch }}

  - id: openzro-upload
    builds: [openzro-upload]
    name_template: >-
      openzro-upload_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: openzro-deb
    package_name: openzro
    maintainer: openZro <dev@openzro.io>
    description: openZro client (zero-trust mesh networking).
    homepage: https://openzro.io/
    license: BSD-3-Clause
    bindir: /usr/bin
    builds: [openzro]
    formats: [deb]
    scripts:
      postinstall: release_files/post_install.sh
      preremove: release_files/pre_remove.sh

  - id: openzro-rpm
    package_name: openzro
    maintainer: openZro <dev@openzro.io>
    description: openZro client (zero-trust mesh networking).
    homepage: https://openzro.io/
    license: BSD-3-Clause
    bindir: /usr/bin
    builds: [openzro]
    formats: [rpm]
    scripts:
      postinstall: release_files/post_install.sh
      preremove: release_files/pre_remove.sh

  # Arch Linux / CachyOS / Manjaro / EndeavourOS native package.
  # Goreleaser produces openzro-<version>-1-<arch>.pkg.tar.zst,
  # which scripts/publish-packages.sh signs (rpmsign-style detached
  # gpg signature) + assembles into a pacman repo at
  # pkg.openzro.io/pacman/<arch>/. Paralel to the apt + yum repos,
  # no AUR dependency.
  - id: openzro-archlinux
    package_name: openzro
    maintainer: openZro <dev@openzro.io>
    description: openZro client (zero-trust mesh networking).
    homepage: https://openzro.io/
    license: BSD-3-Clause
    bindir: /usr/bin
    builds: [openzro]
    formats: [archlinux]
    archlinux:
      pkgbase: openzro
      packager: openZro <dev@openzro.io>
    scripts:
      postinstall: release_files/post_install.sh
      preremove: release_files/pre_remove.sh

# Homebrew tap for macOS users (Stage 5 of ADR-0007). Goreleaser
# auto-generates a formula on every tag push and pushes it to
# `openzro/homebrew-tap`. Users then `brew install openzro/tap/openzro`
# — the dashboard's macOS tab already documents this in the
# "Install with HomeBrew" accordion.
#
# Prerequisites (one-time, on the org side):
#   1. Create the tap repo:
#        gh repo create openzro/homebrew-tap --public \
#          --description "Homebrew tap for openZro"
#      It can start empty — goreleaser will write Formula/openzro.rb
#      on the first tag push.
#   2. Add a HOMEBREW_TAP_TOKEN secret to this repo (`production`
#      environment) — a PAT with `contents:write` on the tap repo.
#      The default GITHUB_TOKEN only has access to the calling repo,
#      hence the separate token.
#
# Until those are in place, snapshot builds are unaffected
# (skip_upload: auto skips on snapshots / prereleases) and tag
# builds will fail at the brew push step. To temporarily disable
# without removing this block, set HOMEBREW_TAP_TOKEN="" in the
# CI env — goreleaser will skip with a warning.
brews:
  - name: openzro
    ids: [openzro]
    # When the HOMEBREW_TAP_TOKEN secret is absent, the calling
    # workflow adds `--skip=homebrew` to the goreleaser invocation
    # so this entire block is bypassed (no formula build, no push).
    # Goreleaser v2.x doesn't have a `disable:` field on brews, and
    # template errors on `{{ .Env.HOMEBREW_TAP_TOKEN }}` are avoided
    # by always exporting the env (empty string when secret missing).
    # See `release_binaries.yml` "Decide goreleaser flags" step.
    repository:
      owner: openzro
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://openzro.io/"
    description: "Open-source mesh networking with WireGuard"
    license: "BSD-3-Clause"
    # auto = skip push for snapshots / prereleases (still builds the
    # formula file in dist/ for inspection). For tag-mode the formula
    # gets pushed.
    skip_upload: auto
    install: |
      bin.install "openzro"
    test: |
      system "#{bin}/openzro", "version"
    service: |
      run [opt_bin/"openzro", "service", "run"]
      keep_alive true
      log_path var/"log/openzro.log"
      error_log_path var/"log/openzro.err"
    caveats: |
      The openzro daemon needs root to manage WireGuard interfaces.
      To start it on login:
        sudo brew services start openzro
      To check status:
        sudo brew services info openzro

# Docker images to ghcr.io only. GITHUB_TOKEN is sufficient — no
# DOCKER_USER / DOCKER_TOKEN required.
dockers:
  - image_templates:
      - ghcr.io/openzro/openzro:{{ .Version }}-amd64
      - ghcr.io/openzro/openzro:latest-amd64
    ids: [openzro]
    goarch: amd64
    use: buildx
    dockerfile: client/Dockerfile
    extra_files:
      - client/openzro-entrypoint.sh
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"

  - image_templates:
      - ghcr.io/openzro/openzro:{{ .Version }}-arm64
      - ghcr.io/openzro/openzro:latest-arm64
    ids: [openzro]
    goarch: arm64
    use: buildx
    dockerfile: client/Dockerfile
    extra_files:
      - client/openzro-entrypoint.sh
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"

  - image_templates:
      - ghcr.io/openzro/management:{{ .Version }}-amd64
      - ghcr.io/openzro/management:latest-amd64
    ids: [openzro-mgmt]
    goarch: amd64
    use: buildx
    dockerfile: management/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"

  - image_templates:
      - ghcr.io/openzro/signal:{{ .Version }}-amd64
      - ghcr.io/openzro/signal:latest-amd64
    ids: [openzro-signal]
    goarch: amd64
    use: buildx
    dockerfile: signal/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"

  - image_templates:
      - ghcr.io/openzro/relay:{{ .Version }}-amd64
      - ghcr.io/openzro/relay:latest-amd64
    ids: [openzro-relay]
    goarch: amd64
    use: buildx
    dockerfile: relay/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"

docker_manifests:
  - name_template: ghcr.io/openzro/openzro:{{ .Version }}
    image_templates:
      - ghcr.io/openzro/openzro:{{ .Version }}-amd64
      - ghcr.io/openzro/openzro:{{ .Version }}-arm64
  - name_template: ghcr.io/openzro/openzro:latest
    image_templates:
      - ghcr.io/openzro/openzro:latest-amd64
      - ghcr.io/openzro/openzro:latest-arm64

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: openzro
    name: openzro
  draft: false
  prerelease: auto
  extra_files:
    - glob: ./infrastructure_files/getting-started-with-zitadel.sh
  header: |
    ## openZro {{ .Tag }}

    See `CHANGELOG.md` (or commit log) for the full list of changes
    in this release.

    ### Verifying downloads

    All artifacts are listed in `checksums.txt` along with their
    SHA-256. Verify with:

    ```sh
    sha256sum -c checksums.txt
    ```

    ### Notes

    - **Windows binaries are unsigned** in this release stream. Windows
      SmartScreen will warn — click "More info" → "Run anyway".
    - **macOS binaries are not notarized** in this release stream. Run
      `xattr -d com.apple.quarantine <path-to-binary>` to remove the
      Gatekeeper quarantine flag.
    - For signed builds, use a tagged release from the upstream
      goreleaser pipeline (TODO: SignPath integration).

snapshot:
  version_template: "{{ .Tag }}-snapshot-{{ .ShortCommit }}"

# Changelog disabled. The fork inherited the full NetBird commit
# history (~7k commits since 2019), which goreleaser's `use: github`
# turns into a 120k+ char body that exceeds GitHub's 125k release-body
# limit. Release notes live in the annotated git tag message instead
# (`git tag -a vX.Y.Z -m "..."`), which goreleaser uses verbatim.
changelog:
  disable: true
