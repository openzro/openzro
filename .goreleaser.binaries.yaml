# Multi-arch manifest lists. Each `name_template` is the unsuffixed
# tag operators reference (e.g. `ghcr.io/openzro/management:0.53.1-alpha.2`),
# which the docker client resolves to the right per-arch image at pull
# time. Without these the helm chart's
# `{repository}:{appVersion}` reference 404s on every cluster — see
# the v0.53.1-alpha.1 smoke test that surfaced this bug.
docker_manifests:
  - name_template: ghcr.io/openzro/openzro:{{ .Version }}
    image_templates:
      - ghcr.io/openzro/openzro:{{ .Version }}-amd64
      - ghcr.io/openzro/openzro:{{ .Version }}-arm64
  - name_template: ghcr.io/openzro/openzro:latest
    image_templates:
      - ghcr.io/openzro/openzro:latest-amd64
      - ghcr.io/openzro/openzro:latest-arm64
  - name_template: ghcr.io/openzro/management:{{ .Version }}
    image_templates:
      - ghcr.io/openzro/management:{{ .Version }}-amd64
      - ghcr.io/openzro/management:{{ .Version }}-arm64
  - name_template: ghcr.io/openzro/management:latest
    image_templates:
      - ghcr.io/openzro/management:latest-amd64
      - ghcr.io/openzro/management:latest-arm64
  - name_template: ghcr.io/openzro/signal:{{ .Version }}
    image_templates:
      - ghcr.io/openzro/signal:{{ .Version }}-amd64
      - ghcr.io/openzro/signal:{{ .Version }}-arm64
  - name_template: ghcr.io/openzro/signal:latest
    image_templates:
      - ghcr.io/openzro/signal:latest-amd64
      - ghcr.io/openzro/signal:latest-arm64
  - name_template: ghcr.io/openzro/relay:{{ .Version }}
    image_templates:
      - ghcr.io/openzro/relay:{{ .Version }}-amd64
      - ghcr.io/openzro/relay:{{ .Version }}-arm64
  - name_template: ghcr.io/openzro/relay:latest
    image_templates:
      - ghcr.io/openzro/relay:latest-amd64
      - ghcr.io/openzro/relay:latest-arm64

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: openzro
    name: openzro
  draft: false
  prerelease: auto
  extra_files:
    - glob: ./infrastructure_files/getting-started-with-zitadel.sh
  header: |
    ## openZro {{ .Tag }}

    Full list of changes in this release:
    https://github.com/openzro/openzro/commits/{{ .Tag }}

    ### Verifying downloads

    All artifacts are listed in `checksums.txt` along with their
    SHA-256. Verify with:

    ```sh
    sha256sum -c checksums.txt
    ```

    ### Notes

    - **Windows binaries are unsigned** in this release stream. Windows
      SmartScreen will warn — click "More info" → "Run anyway".
    - **macOS binaries are not notarized** in this release stream. Run
      `xattr -d com.apple.quarantine <path-to-binary>` to remove the
      Gatekeeper quarantine flag.
    - For signed builds, use a tagged release from the upstream
      goreleaser pipeline (TODO: SignPath integration).

snapshot:
  version_template: "{{ .Tag }}-snapshot-{{ .ShortCommit }}"

# Changelog disabled. The fork inherited the full NetBird commit
# history (~7k commits since 2019), which goreleaser's `use: github`
# turns into a 120k+ char body that exceeds GitHub's 125k release-body
# limit. Release notes live in the annotated git tag message instead
# (`git tag -a vX.Y.Z -m "..."`), which goreleaser uses verbatim.
changelog:
  disable: true
