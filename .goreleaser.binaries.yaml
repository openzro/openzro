# Homebrew tap for macOS users (Stage 5 of ADR-0007). Goreleaser
# auto-generates a formula on every tag push and pushes it to
# `openzro/homebrew-tap`. Users then `brew install openzro/tap/openzro`
# — the dashboard's macOS tab already documents this in the
# "Install with HomeBrew" accordion.
#
# Prerequisites (one-time, on the org side):
#   1. Create the tap repo:
#        gh repo create openzro/homebrew-tap --public \
#          --description "Homebrew tap for openZro"
#      It can start empty — goreleaser will write Formula/openzro.rb
#      on the first tag push.
#   2. Add a HOMEBREW_TAP_TOKEN secret to this repo (`production`
#      environment) — a PAT with `contents:write` on the tap repo.
#      The default GITHUB_TOKEN only has access to the calling repo,
#      hence the separate token.
#
# Until those are in place, snapshot builds are unaffected
# (skip_upload: auto skips on snapshots / prereleases) and tag
# builds will fail at the brew push step. To temporarily disable
# without removing this block, set HOMEBREW_TAP_TOKEN="" in the
# CI env — goreleaser will skip with a warning.
brews:
  - name: openzro
    ids: [openzro]
    # When the HOMEBREW_TAP_TOKEN secret is absent, the calling
    # workflow adds `--skip=homebrew` to the goreleaser invocation
    # so this entire block is bypassed (no formula build, no push).
    # Goreleaser v2.x doesn't have a `disable:` field on brews, and
    # template errors on `{{ .Env.HOMEBREW_TAP_TOKEN }}` are avoided
    # by always exporting the env (empty string when secret missing).
    # See `release_binaries.yml` "Decide goreleaser flags" step.
    repository:
      owner: openzro
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://openzro.io/"
    description: "Open-source mesh networking with WireGuard"
    license: "BSD-3-Clause"
    # auto = skip push for snapshots / prereleases (still builds the
    # formula file in dist/ for inspection). For tag-mode the formula
    # gets pushed.
    skip_upload: auto
    install: |
      bin.install "openzro"
    test: |
      system "#{bin}/openzro", "version"
    service: |
      run [opt_bin/"openzro", "service", "run"]
      keep_alive true
      log_path var/"log/openzro.log"
      error_log_path var/"log/openzro.err"
    caveats: |
      The openzro daemon needs root to manage WireGuard interfaces.
      To start it on login:
        sudo brew services start openzro
      To check status:
        sudo brew services info openzro

# Scoop bucket — Windows power-user install path. The bucket repo is
# created out-of-band (one-time: `openzro/scoop-bucket`) and the
# SCOOP_BUCKET_TOKEN secret is a fine-grained PAT scoped to "Contents:
# write" on that repo only. End-user flow:
#
#     scoop bucket add openzro https://github.com/openzro/scoop-bucket
#     scoop install openzro
#
# Same skip-on-missing-token shape as `brews` above: the calling
# workflow adds `--skip=scoop` when SCOOP_BUCKET_TOKEN is unset, so
# this whole block is bypassed (no manifest push) without a template
# error on the empty env.
#
# Winget is intentionally NOT wired here yet — `winget-pkgs` review
# rejects unsigned MSIs (microsoft/winget-pkgs validators flag the
# SmartScreen reputation), and the .msi this pipeline produces is
# still unsigned (see release_msi step "Build Windows MSI installer
# (unsigned)" in release-binaries.yml + open SignPath integration work
# referenced from issue #1). Add a `winget:` block here once the MSI
# carries an Authenticode signature.
scoops:
  - name: openzro
    ids: [client]
    repository:
      owner: openzro
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://openzro.io/"
    description: "Open-source mesh networking with WireGuard"
    license: "BSD-3-Clause"
    # auto = skip push for snapshots / prereleases (still builds the
    # manifest file in dist/ for inspection). For tag-mode the manifest
    # gets pushed.
    skip_upload: auto
    commit_msg_template: "Scoop update for {{ .ProjectName }} v{{ .Version }}"
    post_install:
      - 'Write-Host "openZro CLI installed. The daemon needs Administrator to manage WireGuard interfaces — run `openzro service install` from an elevated PowerShell to register the Windows service."'

# Docker images to ghcr.io only. GITHUB_TOKEN is sufficient — no
# DOCKER_USER / DOCKER_TOKEN required.
dockers:
  - image_templates:
      - ghcr.io/openzro/openzro:{{ .Version }}-amd64
      - ghcr.io/openzro/openzro:latest-amd64
    ids: [openzro]
    goarch: amd64
    use: buildx
    dockerfile: client/Dockerfile
    extra_files:
      - client/openzro-entrypoint.sh
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"

  - image_templates:
      - ghcr.io/openzro/openzro:{{ .Version }}-arm64
      - ghcr.io/openzro/openzro:latest-arm64
    ids: [openzro]
    goarch: arm64
    use: buildx
    dockerfile: client/Dockerfile
    extra_files:
      - client/openzro-entrypoint.sh
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"

  - image_templates:
      - ghcr.io/openzro/management:{{ .Version }}-amd64
      - ghcr.io/openzro/management:latest-amd64
    ids: [openzro-mgmt]
    goarch: amd64
    use: buildx
    dockerfile: management/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"

  - image_templates:
      - ghcr.io/openzro/management:{{ .Version }}-arm64
      - ghcr.io/openzro/management:latest-arm64
    ids: [openzro-mgmt]
    goarch: arm64
    use: buildx
    dockerfile: management/Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"

  - image_templates:
      - ghcr.io/openzro/signal:{{ .Version }}-amd64
      - ghcr.io/openzro/signal:latest-amd64
    ids: [openzro-signal]
    goarch: amd64
    use: buildx
    dockerfile: signal/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"

  - image_templates:
      - ghcr.io/openzro/signal:{{ .Version }}-arm64
      - ghcr.io/openzro/signal:latest-arm64
    ids: [openzro-signal]
    goarch: arm64
    use: buildx
    dockerfile: signal/Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/openzro/openzro"

  - image_templates:
      - ghcr.io/openzro/relay:{{ .Version }}-amd64
      - ghcr.io/openzro/relay:latest-amd64
    ids: [openzro-relay]
    goarch: amd64
    use: buildx
    dockerfile: relay/Dockerfile
    build_flag_templates:
