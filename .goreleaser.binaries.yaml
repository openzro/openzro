    bindir: /usr/bin
    builds: [openzro-mgmt]
    formats: [archlinux]
    prerelease: "{{ .Prerelease }}"   # see openzro-archlinux comment above
    archlinux:
      pkgbase: openzro-management
      packager: openZro <dev@openzro.io>
    contents:
      - src: release_files/management/openzro-management.service
        dst: /usr/lib/systemd/system/openzro-management.service
      - src: release_files/management/management.json.example
        dst: /etc/openzro/management.json.example
        type: config|noreplace
      - src: release_files/management/openzro-management.env
        dst: /etc/default/openzro-management
        type: config|noreplace
    scripts:
      postinstall: release_files/management/post_install.sh
      preremove: release_files/management/pre_remove.sh

  # ---------- openzro-signal (deb / rpm / archlinux) ----------
  - id: openzro-signal-deb
    package_name: openzro-signal
    maintainer: openZro <dev@openzro.io>
