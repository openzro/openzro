# Simplified GoReleaser config for testing-stage releases.
#
# Compared to .goreleaser.yaml (the full upstream-derived config):
#   - No Docker Hub push (only ghcr.io, which uses GITHUB_TOKEN).
#   - No apt/yum repo upload to wiretrustee.com (defunct domain) —
#     ours go to pkg.openzro.io via scripts/publish-packages.sh.
#   - No code signing (Windows / macOS unsigned — alpha/beta only;
#     SignPath EV + Apple Dev ID tracked as ADR-0007 Phase 2).
#   - No goreleaser-pro features.
#   - .deb / .rpm packages still produced and attached to the GitHub
#     Release as plain downloadable artifacts.
#   - Homebrew tap push to openzro/homebrew-tap (Stage 5 of ADR-0007)
#     gated on the HOMEBREW_TAP_TOKEN secret being set.
#
# Use this config until we either (a) get OSS signing through
# SignPath / Certum, or (b) decide to ship to a managed apt/yum
# host (Cloudsmith free OSS plan is the pre-decided path).

version: 2

project_name: openzro

builds:
  - id: openzro
    dir: client
    binary: openzro
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64, arm, "386"]
    ignore:
      - { goos: windows, goarch: arm64 }
      - { goos: windows, goarch: arm }
      - { goos: windows, goarch: "386" }
      - { goos: darwin,  goarch: arm }
      - { goos: darwin,  goarch: "386" }
    ldflags:
      # selfupdate.buildTeamID (#5 R4): this is the config the REAL
      # release pipeline runs (release-binaries.yml --config
      # .goreleaser.binaries.yaml), so the Team-ID pin MUST be here —
      # not only in .goreleaser.yaml. Without it the shipped daemon
      # has BuildTeamID()=="" and every future self-update fails
      # closed at Verify. `index .Env` (not `.Env.X`) so a build
      # without the secret gets "" rather than erroring — empty =>
      # fail-closed (no self-update), correct for non-release/non-mac.
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser -X github.com/openzro/openzro/version/selfupdate.buildTeamID={{ if index .Env "APPLE_TEAM_ID" }}{{ .Env.APPLE_TEAM_ID }}{{ end }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags:
      - load_wgnt_from_rsrc

  - id: openzro-mgmt
    dir: management
    binary: openzro-mgmt
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: openzro-signal
    dir: signal
    binary: openzro-signal
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: openzro-relay
    dir: relay
    binary: openzro-relay
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: openzro-upload
    dir: upload-server
    binary: openzro-upload
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

# Lipo the per-arch darwin CLI binaries into a universal one. The
# release_pkg job (build_macos_pkg) needs a single universal binary
# to embed in the .pkg installer — without this, it would have to
# download both per-arch tarballs and lipo at install time.
# replace: false keeps the per-arch tarballs around too — users on a
# specific architecture can still grab a smaller download.
universal_binaries:
  - id: openzro
    replace: false

archives:
  - id: client
    builds: [openzro]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

  - id: openzro-mgmt
    builds: [openzro-mgmt]
    name_template: >-
      openzro-mgmt_{{ .Version }}_{{ .Os }}_{{ .Arch }}

  - id: openzro-signal
    builds: [openzro-signal]
    name_template: >-
      openzro-signal_{{ .Version }}_{{ .Os }}_{{ .Arch }}

  - id: openzro-relay
    builds: [openzro-relay]
    name_template: >-
      openzro-relay_{{ .Version }}_{{ .Os }}_{{ .Arch }}

  - id: openzro-upload
    builds: [openzro-upload]
    name_template: >-
      openzro-upload_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: openzro-deb
    package_name: openzro
    maintainer: openZro <dev@openzro.io>
    description: openZro client (zero-trust mesh networking).
    homepage: https://openzro.io/
    license: BSD-3-Clause
    bindir: /usr/bin
    builds: [openzro]
    formats: [deb]
    scripts:
      postinstall: release_files/post_install.sh
      preremove: release_files/pre_remove.sh

  - id: openzro-rpm
    package_name: openzro
    maintainer: openZro <dev@openzro.io>
    description: openZro client (zero-trust mesh networking).
    homepage: https://openzro.io/
    license: BSD-3-Clause
    bindir: /usr/bin
    builds: [openzro]
    formats: [rpm]
    scripts:
      postinstall: release_files/post_install.sh
      preremove: release_files/pre_remove.sh

  # Arch Linux / CachyOS / Manjaro / EndeavourOS native package.
  # Goreleaser produces openzro-<version>-1-<arch>.pkg.tar.zst,
  # which scripts/publish-packages.sh signs (rpmsign-style detached
  # gpg signature) + assembles into a pacman repo at
  # pkg.openzro.io/pacman/<arch>/. Paralel to the apt + yum repos,
  # no AUR dependency.
  - id: openzro-archlinux
    package_name: openzro
    maintainer: openZro <dev@openzro.io>
    description: openZro client (zero-trust mesh networking).
    homepage: https://openzro.io/
    license: BSD-3-Clause
    bindir: /usr/bin
    builds: [openzro]
    formats: [archlinux]
    # Arch's pkgver can't contain '-' (it's the separator before
    # pkgrel). Without the explicit `prerelease` field, nfpm splits
    # `0.53.1-alpha.13` into pkgver=0.53.1 + pkgrel=alpha.13, then
    # alpha.13 is rejected as a non-numeric pkgrel and forced back
    # to 1 — every alpha tag ships as PKGINFO `pkgver=0.53.1-1`,
    # so `pacman -Syu` never sees an upgrade. Setting prerelease
    # makes nfpm emit `pkgver=0.53.1.alpha.13` (`.` joiner per Arch
    # convention) so vercmp distinguishes alpha.13 < alpha.14.
    prerelease: "{{ .Prerelease }}"
    archlinux:
      pkgbase: openzro
      packager: openZro <dev@openzro.io>
    scripts:
      postinstall: release_files/post_install.sh
      preremove: release_files/pre_remove.sh

  # =====================================================================
  # SERVER-SIDE PACKAGES (bare-metal install path)
  # =====================================================================
  # Until now the openZro server (management + signal + relay) was
  # K8s/Docker-only. The bare-metal Ansible playbook needs deb / rpm /
  # archlinux packages so operators can `apt install openzro-management`,
  # tweak /etc/openzro/management.json, and `systemctl start` without
  # ever touching containers. The binaries themselves are already
  # built (openzro-mgmt, openzro-signal, openzro-relay above) — we
  # just wrap them in nfpms metadata + systemd unit + post-install.
  # =====================================================================

  # ---------- openzro-management (deb / rpm / archlinux) ----------
  - id: openzro-management-deb
    package_name: openzro-management
    maintainer: openZro <dev@openzro.io>
    description: openZro management server (control plane, IdP integration, peer registry).
    homepage: https://openzro.io/
    license: BSD-3-Clause
    bindir: /usr/bin
    builds: [openzro-mgmt]
    formats: [deb]
    contents:
      - src: release_files/management/openzro-management.service
        dst: /lib/systemd/system/openzro-management.service
      - src: release_files/management/management.json.example
        dst: /etc/openzro/management.json.example
        type: config|noreplace
      - src: release_files/management/openzro-management.env
        dst: /etc/default/openzro-management
        type: config|noreplace
    scripts:
      postinstall: release_files/management/post_install.sh
      preremove: release_files/management/pre_remove.sh

  - id: openzro-management-rpm
    package_name: openzro-management
    maintainer: openZro <dev@openzro.io>
    description: openZro management server (control plane, IdP integration, peer registry).
    homepage: https://openzro.io/
