version: 2

project_name: openzro-ui
builds:
  - id: openzro-ui
    dir: client/ui
    binary: openzro-ui
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: openzro-ui-windows
    dir: client/ui
    binary: openzro-ui
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
      - -H windowsgui
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: linux-arch
    name_template: "{{ .ProjectName }}-linux_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - openzro-ui
  - id: windows-arch
    name_template: "{{ .ProjectName }}-windows_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - openzro-ui-windows

nfpms:
  - maintainer: Openzro <dev@openzro.io>
    description: Openzro client UI.
    homepage: https://openzro.io/
    id: openzro-ui-deb
    package_name: openzro-ui
    builds:
      - openzro-ui
    formats:
      - deb
    scripts:
      postinstall: "release_files/ui-post-install.sh"
    contents:
      - src: client/ui/build/openzro.desktop
        dst: /usr/share/applications/openzro.desktop
      - src: client/ui/assets/openzro.png
        dst: /usr/share/pixmaps/openzro.png
    dependencies:
      - openzro

  - maintainer: Openzro <dev@openzro.io>
    description: Openzro client UI.
    homepage: https://openzro.io/
    id: openzro-ui-rpm
    package_name: openzro-ui
    builds:
      - openzro-ui
    formats:
      - rpm
    scripts:
      postinstall: "release_files/ui-post-install.sh"
    contents:
      - src: client/ui/build/openzro.desktop
        dst: /usr/share/applications/openzro.desktop
      - src: client/ui/assets/openzro.png
        dst: /usr/share/pixmaps/openzro.png
    dependencies:
      - openzro

  # archlinux nfpm — produces openzro-ui_<v>_linux_amd64.pkg.tar.zst
  # for the pacman repo at pkg.openzro.io/pacman/<arch>/. Sister of
  # the deb + rpm entries above; same desktop entry + icon contents.
  - maintainer: Openzro <dev@openzro.io>
    description: openZro client UI (system tray).
    homepage: https://openzro.io/
    license: BSD-3-Clause
    id: openzro-ui-archlinux
    package_name: openzro-ui
    builds:
      - openzro-ui
    formats:
      - archlinux
    archlinux:
      pkgbase: openzro-ui
      packager: openZro <dev@openzro.io>
    scripts:
      postinstall: "release_files/ui-post-install.sh"
    contents:
      - src: client/ui/build/openzro.desktop
        dst: /usr/share/applications/openzro.desktop
      - src: client/ui/assets/openzro.png
        dst: /usr/share/pixmaps/openzro.png
    dependencies:
      - openzro

uploads:
  - name: debian
    ids:
      - openzro-ui-deb
    mode: archive
    target: https://pkgs.wiretrustee.com/debian/pool/{{ .ArtifactName }};deb.distribution=stable;deb.component=main;deb.architecture={{ if .Arm }}armhf{{ else }}{{ .Arch }}{{ end }};deb.package=
    username: dev@wiretrustee.com
    method: PUT

  - name: yum
    ids:
      - openzro-ui-rpm
    mode: archive
    target: https://pkgs.wiretrustee.com/yum/{{ .Arch }}{{ if .Arm }}{{ .Arm }}{{ end }}
    username: dev@wiretrustee.com
    method: PUT
