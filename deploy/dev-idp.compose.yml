# openZro · local IdP for dashboard development
#
# Brought up by `make dev.idp.up`, torn down by `make dev.idp.down`.
# Dex (https://github.com/dexidp/dex) — Apache-2.0, CNCF — serves
# OIDC at http://localhost:5556. The dashboard's @axa-fr/react-oidc
# points here as `authority`. Provisioning is just templating
# the management.json + dashboard/.local-config.json from
# deploy/dev-idp/provision.sh; Dex itself is config-file driven.
#
# Replaces an earlier Zitadel-based stack (see ADR-0006). Dex is
# leaner — single binary, no Postgres, in-memory storage in dev.

name: openzro-dev-idp

services:
  dex:
    image: ghcr.io/dexidp/dex:v2.45.0-distroless
    restart: unless-stopped
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./dev-idp/dex.config.yaml:/etc/dex/config.yaml:ro
      # openZro brand theme drops alongside Dex's bundled
      # themes/light + themes/dark. Mounting a subpath leaves
      # the rest of /srv/dex/web (static, templates, other
      # themes) intact so we override colour + logo only.
      - ./dev-idp/web/themes/openzro:/srv/dex/web/themes/openzro:ro
    ports:
      - "5556:5556"
      # gRPC API for runtime connector management. The
      # local management binary runs on the host, so we
      # expose this port on localhost — production uses
      # the docker network only.
      - "127.0.0.1:5557:5557"
    healthcheck:
      # Dex exposes /healthz on the same port as OIDC. The wait
      # in provision.sh polls this so dev.management.up doesn't
      # race the IdP boot.
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5556/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
