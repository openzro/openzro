# Dex configuration for openZro local development.
#
# Brought up by `make dev.idp.up` via deploy/dev-idp.compose.yml.
# Dex serves at http://localhost:5556 with in-memory storage —
# every restart clears users, but the static admin below is
# re-seeded by config so contributors can sign in immediately
# after a fresh `dev.idp.up`.
#
# This file mirrors the production-shaped infrastructure_files/
# dex.config.yaml.tmpl that operators get in the quickstart bundle
# (Stage 2). The only difference is in-memory storage + plain
# HTTP. Production uses sqlite/postgres + the operator's TLS.

issuer: http://localhost:5556

storage:
  type: memory

# openZro brand theme. The compose volume mount drops our
# custom themes/openzro/ alongside Dex's bundled themes; this
# config selects ours. dir keeps Dex's default static + templates
# (we override only the colour palette + logo, not the HTML).
frontend:
  dir: /srv/dex/web
  theme: openzro
  issuer: openZro

web:
  http: 0.0.0.0:5556
  # Skip approval is fine for dev — production keeps it on so
  # users see the consent step the first time. Per Dex docs.
  allowedOrigins:
    - http://localhost:3000

# The dashboard SPA points its @axa-fr/react-oidc here.
# Public client (PKCE; no client_secret) so the dashboard can
# authenticate from the browser without exposing a secret.
staticClients:
  - id: openzro-dashboard
    name: openZro Dashboard
    public: true
    redirectURIs:
      # Dashboard's @axa-fr/react-oidc lands on these paths after
      # the OIDC authorization code exchange. Add as the dashboard
      # config evolves.
      - http://localhost:3000/auth
      - http://localhost:3000/silent-auth
      - http://localhost:3000/peers
      - http://localhost:3000/

# Built-in admin so a fresh dev environment has a usable login
# without the contributor having to wire any external IdP. Email
# admin@openzro.dev / password "openzro" — bcrypt cost 10. To
# rotate: openssl/htpasswd/Go bcrypt → replace the hash here.
enablePasswordDB: true
staticPasswords:
  - email: admin@openzro.dev
    hash: "$2a$10$FnWvg5MH2t6QLmRkxC/WAervu3W3rrK0PJce1eKIYgQMp/S8oVuMy"
    username: admin
    userID: openzro-dev-admin

# OAuth2 server behaviour — dev defaults are friendly. Skipping
# the approval screen makes the contributor's first sign-in a
# single click. Production should NOT skip.
oauth2:
  responseTypes:
    - code
  skipApprovalScreen: true

# Connectors (Google, GitHub, Microsoft, LDAP, SAML, OIDC, …) go
# here. Empty for dev — contributors who need to test federation
# add the connector block, restart Dex, sign in via that provider.
# See https://dexidp.io/docs/connectors/ for the full list.
connectors: []

# Logging — info is the right default. Switch to debug if you're
# debugging connector flows.
logger:
  level: info
  format: text
