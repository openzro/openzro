<!DOCTYPE html>
<html lang="en">
<head>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f7f8f9;
            font-family: sans-serif, Arial, Tahoma;
        }

        .container {
            width: 100%;
            background: white;
            border: 1px solid #e8e9ea;
            text-align: center;
            padding: 20px;
            padding-bottom: 50px;
            max-width: 550px;
            margin: 0 10px;
        }

        .logo {
            height: 80px;
            border-bottom: 1px solid #e8e9ea;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo img {
            width: 130px;
        }

        .content {
            font-size: 13px;
            color: #525252;
            line-height: 18px;
            padding: 10px 0;
        }

        .content div {
            font-size: 18px;
            line-height: normal;
            margin-bottom: 5px;
            color: black;
        }
    </style>
    <title>openZro Login Successful</title>
</head>
<body>
<div class="container">
    <div class="logo">
        <!-- Inline brand mark + wordmark. Inline so the success page
             works offline (no third-party CDN ping after auth) and
             the brand renders even when the runner has no internet
             outbound left after the callback. Mirror of
             brand/openzro-icon.svg + the .oz-wordmark CSS pattern. -->
        <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 64 64" fill="none" aria-label="openZro">
            <defs>
                <linearGradient id="oz-bg-light" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#8b5cf6"/>
                    <stop offset="1" stop-color="#5b21b6"/>
                </linearGradient>
            </defs>
            <circle cx="32" cy="32" r="28" fill="url(#oz-bg-light)"/>
            <path fill="#f9f9f9" d="m 42.69949,50.729586 c -5.246771,-1.783072 -10.782457,-1.832655 -16.63185,0 -0.668227,0.02122 -0.999265,-0.317022 -0.478323,-0.97503 L 47.71668,18.700815 c 0,0 0.157573,-0.196687 0.354413,-0.298049 0.147255,-0.07583 0.295663,-0.0759 0.450161,0.0028 0.163897,0.08346 0.281363,0.233899 0.343513,0.325372 5.118536,7.533388 8.852414,20.216321 -4.595268,31.484113 -0.587268,0.492072 -0.882773,0.514556 -1.57001,0.514557 z"/>
            <g transform="rotate(180 32 32)">
                <path fill="#f9f9f9" d="m 42.69949,50.729586 c -5.246771,-1.783072 -10.782457,-1.832655 -16.63185,0 -0.668227,0.02122 -0.999265,-0.317022 -0.478323,-0.97503 L 47.71668,18.700815 c 0,0 0.157573,-0.196687 0.354413,-0.298049 0.147255,-0.07583 0.295663,-0.0759 0.450161,0.0028 0.163897,0.08346 0.281363,0.233899 0.343513,0.325372 5.118536,7.533388 8.852414,20.216321 -4.595268,31.484113 -0.587268,0.492072 -0.882773,0.514556 -1.57001,0.514557 z"/>
            </g>
        </svg>
        <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-weight:600;font-size:30px;letter-spacing:-0.025em;color:#0f0a1f;margin-left:14px;">open<span style="font-weight:700;color:#7c3aed;">Z</span>ro</span>
    </div>
    <br>
    {{ if .Error }}
    <svg height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" fill="none" r="45" stroke="red" stroke-width="3"/>
        <path d="M30 30 L70 70 M30 70 L70 30" fill="none" stroke="red" stroke-width="3"/>
    </svg>
    <div class="content">
        <div>
            Login failed
        </div>
        {{ .Error }}.
    </div>
    {{ else }}
    <svg height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" fill="none" r="45" stroke="#5cb85c" stroke-width="3"/>
        <path d="M30 50 L45 65 L70 35" fill="none" stroke="#5cb85c" stroke-width="5"/>
    </svg>
    <div class="content">
        <div>
            Login successful
        </div>
        Your device is now registered and logged in to openZro.
        <br>
        You can now close this window.
    </div>
    {{ end }}
</div>
</body>
</html>
