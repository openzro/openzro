# macOS desktop UI release.
#
# Runs on a darwin runner (macos-14 or later) — CGO Fyne build cannot
# cross-compile from Linux. Produces a universal binary (amd64+arm64
# fat binary), wraps it as a proper .app bundle so the installer can
# drop it into /Applications/ (Launchpad / Dock / Spotlight aware),
# and tarballs the bundle for download.
#
# No code signing or notarization in this stream — users will need to
# `xattr -d com.apple.quarantine` after download (Gatekeeper warning).
# SignPath / Apple Developer ID is the planned future path.

version: 2

project_name: openzro-ui

builds:
  - id: openzro-ui-darwin
    dir: client/ui
    binary: openzro-ui
    env:
      - CGO_ENABLED=1
      - MACOSX_DEPLOYMENT_TARGET=11.0
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/openzro/openzro/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags: [load_wgnt_from_rsrc]

universal_binaries:
  - id: openzro-ui-darwin
    replace: true
    # After lipo, wrap the universal binary as a proper macOS .app
    # bundle (Info.plist, Icon.icns, Contents/MacOS/...). The script
    # *moves* the binary into the .app and leaves a tiny exec stub
    # at the original path so anything else in the goreleaser
    # pipeline that references {{ .Path }} still works.
    hooks:
      post:
        - cmd: bash scripts/wrap-darwin-app.sh
          env:
            - OPENZRO_BIN={{ .Path }}
            - OPENZRO_VER={{ .Version }}

archives:
  - id: darwin
    builds: [openzro-ui-darwin]
    name_template: "{{ .ProjectName }}_{{ .Version }}_darwin_universal"
    # Include the .app bundle that wrap-darwin-app.sh created next
    # to the universal binary. The bare binary at the archive root
    # is also kept (it's the stub that exec's into the .app) so
    # users who tar -x to /usr/local/bin/ get the same behaviour as
    # before, while installer flows can reach for the .app subdir.
    files:
      - src: "dist/openzro-ui-darwin_darwin_all/openZro UI.app/**/*"
        dst: "openZro UI.app"

checksum:
  name_template: "openzro-ui_darwin_checksums.txt"

release:
  github:
    owner: openzro
    name: openzro
  draft: false
  prerelease: auto
  mode: append

snapshot:
  version_template: "{{ .Tag }}-snapshot-{{ .ShortCommit }}"

changelog:
  disable: true
