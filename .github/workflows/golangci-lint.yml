name: Lint
on: [pull_request]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || github.actor_id }}
  cancel-in-progress: true

jobs:
  codespell:
    name: codespell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: codespell
        uses: codespell-project/actions-codespell@v2
        with:
          # ignore_words_list collects:
          #   - upstream NetBird false positives carried over (erro, clienta,
          #     hastable, iif, groupd, testin, groupe)
          #   - openZro Portuguese-language docs + comments (vai, ser,
          #     momento, controles) — fork ships PT-BR text in compliance
          #     docs (BACEN 4893) and brand notes
          #   - camelCase identifiers in TypeScript that codespell reads
          #     as English: allTime (a date-range option), MapPin (the
          #     Lucide icon component), keep-alives (legit term in our
          #     dialect)
          #   - GPG colon-format field names that look like typos: fpr
          #   - English variants we ship deliberately: pre-emptively,
          #     unparseable
          ignore_words_list: erro,clienta,hastable,iif,groupd,testin,groupe,vai,ser,momento,controles,allTime,MapPin,keep-alives,fpr,pre-emptively,unparseable,Policie
          # package-lock.json is auto-generated by npm — flagged Oje / Nd
          # come from minified license blobs. The leading `./` matches
          # codespell's diagnostic path format (without it, the skip is
          # silently ineffective).
          skip: go.mod,go.sum,./dashboard/package-lock.json,*/package-lock.json
  golangci:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            display_name: Darwin
          - os: windows-latest
            display_name: Windows
          - os: ubuntu-latest
            display_name: Linux
    name: ${{ matrix.display_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check for duplicate constants
        if: matrix.os == 'ubuntu-latest'
        run: |
          ! awk '/const \(/,/)/{print $0}' management/server/activity/codes.go | grep -o '= [0-9]*' | sort | uniq -d | grep .
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: false
      - name: Install dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt update && sudo apt install -y -q libgtk-3-dev libayatana-appindicator3-dev libgl1-mesa-dev xorg-dev libpcap-dev
      - name: golangci-lint
        # The repo's go.mod targets Go 1.25. The action's pre-built
        # golangci-lint binaries (downloaded via `install-mode: binary`,
        # the default) are built with Go 1.24, which rejects this repo
        # with "Go language version used to build golangci-lint is lower
        # than the targeted Go version".
        #
        # `install-mode: goinstall` compiles golangci-lint from source
        # using the runner's Go toolchain (1.25, set above by setup-go),
        # producing a binary that handles 1.25 source. Slower per run
        # (~30s build) but bulletproof against the binary/toolchain
        # version skew.
        #
        # Pinned to v1.62.2 — last v1.x release before the v2 split. v2
        # would force a config migration (this repo's .golangci.yaml is
        # in v1 format); revisit when there's appetite for that.
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          install-mode: goinstall
          args: --timeout=12m --out-format colored-line-number
