name: "Windows"

on:
  push:
    branches:
      - main
  pull_request:

env:
  downloadPath: '${{ github.workspace }}\temp'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || github.actor_id }}
  cancel-in-progress: true

jobs:
  test:
    name: "Client / Unit"
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        id: go
        with:
          go-version: "1.25.x"
          cache: false

      - name: Get Go environment
        run: |
          echo "cache=$(go env GOCACHE)" >> $env:GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $env:GITHUB_ENV
          # PsExec64 runs as SYSTEM and inherits a different PATH
          # (no setup-go modifications), so the hardcoded
          # `C:\hostedtoolcache\windows\go\<resolved>\x64\bin\go.exe`
          # path was needed to call the right binary. setup-go@v5
          # changed the layout — `windows\go` became just `go` —
          # so the hardcoded path stopped resolving and PsExec64
          # exited with "system cannot find the path specified".
          # GOROOT is reliably set by setup-go on every version, so
          # use that to compute the binary path at runtime.
          echo "goexe=$(go env GOROOT)\bin\go.exe" >> $env:GITHUB_ENV

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: ${{ runner.os }}-gotest-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gotest-
            ${{ runner.os }}-go-

      - name: Download wintun
        uses: carlosperate/download-file-action@v2
        id: download-wintun
        with:
          file-url: https://www.wintun.net/builds/wintun-0.14.1.zip
          file-name: wintun.zip
          location: ${{ env.downloadPath }}
          sha256: '07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51'

      - name: Decompressing wintun files
        run: tar -zvxf "${{ steps.download-wintun.outputs.file-path }}" -C ${{ env.downloadPath }}

      - run: mv ${{ env.downloadPath }}/wintun/bin/amd64/wintun.dll 'C:\Windows\System32\'

      - run: choco install -y sysinternals --ignore-checksums
      - run: choco install -y mingw

      - run: PsExec64 -s -w ${{ github.workspace }} ${{ env.goexe }} env -w GOMODCACHE=${{ env.cache }}
      - run: PsExec64 -s -w ${{ github.workspace }} ${{ env.goexe }} env -w GOCACHE=${{ env.modcache }}
      - run: PsExec64 -s -w ${{ github.workspace }} ${{ env.goexe }} mod tidy
      - run: echo "files=$(go list ./... | ForEach-Object { $_ } | Where-Object { $_ -notmatch '/management' })" >> $env:GITHUB_ENV

      - name: test
        # Direct PsExec64 → go.exe, without the cmd.exe /c "..."
        # wrapper. The previous form redirected to test-out.txt and
        # the next step tried to Get-Content it back, but the file
        # was either never created (cmd.exe command-line length
        # limit truncating the huge package list before the redirect
        # parsed) or was SYSTEM-owned and unreadable to the runner
        # user — either way every Windows run failed with
        # "test-out.txt does not exist" and the underlying go test
        # error stayed invisible. PsExec64 forwards the remote
        # process stdout/stderr to its own stdout, which Actions
        # captures into the job log natively — no intermediate file
        # needed.
        run: PsExec64 -s -nobanner -w ${{ github.workspace }} ${{ env.goexe }} test -tags=devcert -timeout 10m -p 1 ${{ env.files }}
