# Single release pipeline. Builds CLI / daemon binaries, the desktop
# UI client, Docker images, MSI / PKG installers, dashboard image, the
# APT/YUM/DNF/zypper/pacman repos at pkg.openzro.io, and pushes the
# `openzro-bin` PKGBUILD to AUR. Everything publishes to one GitHub
# Release + ghcr.io. No Docker Hub. No Homebrew tap creds yet (gated
# by the HOMEBREW_TAP_TOKEN secret).
#
# Trigger: push of a `v*` tag, or manual dispatch (snapshot mode).
# This is the only release entrypoint — the upstream `release.yml`
# was removed because it duplicated the UI builds (causing GitHub
# `asset already_exists` 422 conflicts) and depended on Docker Hub
# secrets we don't have.
#
# Job layout:
#   1. release            (ubuntu-22.04) — CLI + 4 daemons + Docker, .deb/.rpm/.pkg.tar.zst
#   2. release_ui         (ubuntu-22.04) — desktop UI for Linux + Windows
#   3. release_ui_macos   (macos-14)     — desktop UI universal binary for macOS
#   4. release_dex        (ubuntu-22.04) — ghcr.io/openzro/dex image (theme baked in)
#   5. release_dashboard  (ubuntu-22.04) — ghcr.io/openzro/dashboard image
#   6. build_macos_pkg    (macos-14)     — unsigned macOS PKG installer
#   7. build_windows_msi  (windows-2022) — unsigned Windows MSI installer
#   8. publish_packages   (ubuntu-22.04) — APT/YUM/DNF/zypper/pacman repos to gh-pages
#   9. publish_aur        (ubuntu-22.04) — push openzro-bin PKGBUILD to AUR
# Everything `mode: append`s to the same GitHub Release on tag push.

name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Build a snapshot (no tag, no GitHub Release)"
        required: false
        default: "true"

permissions:
  contents: write   # publish GitHub Release + upload assets
  packages: write   # push to ghcr.io

env:
  GORELEASER_VER: "v2.3.2"

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install OS build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y -q gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu

      - name: Decide goreleaser flags
        id: flags
        env:
          # Resolves to "" when the secret isn't configured (GH Actions
          # silently substitutes empty); we use that as the signal to
          # skip the brew step instead of letting goreleaser fail at
          # push-time. Once the org creates openzro/homebrew-tap and
          # adds the secret, this branch flips automatically.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.snapshot }}" = "true" ]; then
            args="release --clean --snapshot --skip=publish"
          elif [ "${{ github.event_name }}" = "push" ]; then
            args="release --clean"
          else
            args="release --clean --snapshot --skip=publish"
          fi
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            args="$args --skip=homebrew"
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping brew formula push (ADR-0007 Stage 5)"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ${{ env.GORELEASER_VER }}
          args: ${{ steps.flags.outputs.args }} --config .goreleaser.binaries.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Always export — goreleaser's brews template references
          # `{{ .Env.HOMEBREW_TAP_TOKEN }}` and would error on a
          # truly-undefined env var. Empty string is fine; the
          # `--skip=homebrew` flag (set above when token is absent)
          # bypasses the brews step entirely.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Upload snapshot artifacts
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: openzro-snapshot
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/checksums.txt
          retention-days: 14

  release_ui:
    name: Release desktop UI (Linux + Windows)
    runs-on: ubuntu-22.04
    # Run after the main `release` job creates the GitHub Release on
    # tag push, so this one's `mode: append` has something to attach to.
    needs: [release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install desktop UI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y -q \
            libappindicator3-dev \
            gir1.2-appindicator3-0.1 \
            libxxf86vm-dev \
            gcc-mingw-w64-x86-64

      - name: Decide goreleaser flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.snapshot }}" = "true" ]; then
            echo "args=release --clean --snapshot --skip=publish" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          else
            echo "args=release --clean --snapshot --skip=publish" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser (UI Linux + Windows)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ${{ env.GORELEASER_VER }}
          args: ${{ steps.flags.outputs.args }} --config .goreleaser.ui-binaries.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload UI snapshot artifacts
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: openzro-ui-snapshot
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/openzro-ui_checksums.txt
          retention-days: 14

  release_ui_macos:
    name: Release desktop UI (macOS universal)
    runs-on: macos-14
    needs: [release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Decide goreleaser flags
        id: flags
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.snapshot }}" = "true" ]; then
            echo "args=release --clean --snapshot --skip=publish" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          else
            echo "args=release --clean --snapshot --skip=publish" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser (UI macOS)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ${{ env.GORELEASER_VER }}
          args: ${{ steps.flags.outputs.args }} --config .goreleaser.ui-darwin.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload UI macOS snapshot artifacts
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: openzro-ui-macos-snapshot
          path: |
            dist/*.tar.gz
            dist/openzro-ui_darwin_checksums.txt
          retention-days: 14

  release_msi:
    name: Build Windows MSI installer (unsigned)
    runs-on: windows-latest
    # Only on tag push — needs the GH Release to exist (so we can
    # download the openzro / openzro-ui Windows zips that the
    # `release` and `release_ui` jobs uploaded). Snapshot builds
    # skip the MSI; users can grab the .zip from artifacts.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [release, release_ui]
    permissions:
      contents: write   # gh release upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # Two version forms emit:
          #
          #   - `version`  : SemVer-flavoured, with the leading `v`
          #     stripped — used in artifact filenames so MSI users
          #     see `openzro_0.53.1-alpha.1_windows_amd64.msi` (matches
          #     what `useLatestRelease()` regex in the dashboard expects).
          #
          #   - `msi_version` : strict Major.Minor.Build.Revision
          #     numeric. WiX rejects pre-release suffixes (`-alpha.1`)
          #     and complains "version is not a four-part dot-numeric".
          #     We coerce by promoting the tail of the pre-release
          #     identifier to Revision (so `0.53.1-alpha.1` →
          #     `0.53.1.1`, stable `0.53.1` → `0.53.1.0`). Upgrade
          #     ordering between alpha.N and the eventual stable is
          #     correct: `0.53.1.1` < `0.53.1.0` is false (1 > 0)
          #     so the stable revision has its own "1" continuation
          #     — re-tag the operator MSI on stable as `0.53.1.99`
          #     or similar if pre-release count exceeded that.
          TAG="${GITHUB_REF_NAME}"
          SEMVER="${TAG#v}"
          BASE="${SEMVER%%-*}"
          PRE="${SEMVER#${BASE}}"
          if [ -n "$PRE" ]; then
            # PRE looks like "-alpha.1" — take the trailing number.
            REVISION="${PRE##*.}"
            # If the pre-release had no dotted number (e.g. just
            # "-alpha"), coerce to 0.
            case "$REVISION" in
              ''|*[!0-9]*) REVISION=0 ;;
            esac
          else
            REVISION=0
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "msi_version=${BASE}.${REVISION}" >> "$GITHUB_OUTPUT"

      - name: Stage binaries from GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $stage = "dist\openzro_windows_amd64"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          # The CLI/daemon zip and the desktop UI zip both ship a
          # single .exe at the archive root (openzro.exe and
          # openzro-ui.exe respectively). Goreleaser names them
          # `openzro_<v>_windows_amd64.zip` / `openzro-ui_<v>_windows_amd64.zip`.
          gh release download "${{ steps.ver.outputs.tag }}" `
            --repo "${{ github.repository }}" `
            --pattern "openzro_*_windows_amd64.zip" `
            --pattern "openzro-ui_*_windows_amd64.zip" `
            --dir "dist"

          Get-ChildItem "dist\openzro*_windows_amd64.zip" | ForEach-Object {
            Write-Host "Extracting $($_.Name)"
            Expand-Archive -Path $_.FullName -DestinationPath $stage -Force
          }

          Get-ChildItem $stage

      - name: Download wintun driver
        shell: pwsh
        run: |
          # Canonical source — wintun.net is operated by the
          # WireGuard team. SHA matches the same archive we use in
          # golang-test-windows.yml so the dev-test and release
          # builds bundle bit-identical drivers.
          $url  = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          $sha  = "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51"

          Invoke-WebRequest -Uri $url -OutFile "wintun.zip"
          $got = (Get-FileHash -Algorithm SHA256 "wintun.zip").Hash.ToLower()
          if ($got -ne $sha) {
            throw "wintun.zip SHA256 mismatch: expected $sha, got $got"
          }

          Expand-Archive -Path "wintun.zip" -DestinationPath "wintun-extract" -Force
          Copy-Item "wintun-extract\wintun\bin\amd64\wintun.dll" `
            "dist\openzro_windows_amd64\wintun.dll" -Force

      - name: Install WiX 4 toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          # The dotnet tools dir lands on PATH only for new shells —
          # a fresh pwsh step picks it up automatically, but emit
          # the version here as a smoke test.
          wix --version

      - name: Add WiX Util extension
        shell: pwsh
        run: |
          # The wxs uses <util:CloseApplication>, which lives in the
          # Util extension. `wix extension add -g` registers it in
          # the global cache so `wix build -ext WixToolset.Util.wixext`
          # picks it up.
          wix extension add -g WixToolset.Util.wixext/4.0.5

      - name: Build MSI
        shell: pwsh
        env:
          # WiX's <Package Version="$(env.OPENZRO_VERSION)"> reads
          # this env var and rejects anything not Major.Minor.Build
          # [.Revision] all-numeric. The msi_version output coerces
          # pre-release tags into the dot-numeric form (see the
          # version step's comment).
          OPENZRO_VERSION: ${{ steps.ver.outputs.msi_version }}
        run: |
          # Artifact name keeps the SemVer flavour for users who
          # download manually + for the dashboard's useLatestRelease
          # asset regex.
          $msi = "dist\openzro_${{ steps.ver.outputs.version }}_windows_amd64.msi"
          wix build client/openzro.wxs `
            -ext WixToolset.Util.wixext `
            -arch x64 `
            -out $msi
          if (-not (Test-Path $msi)) {
            throw "MSI build did not produce $msi"
          }
          Write-Host "Built $msi ($([math]::Round((Get-Item $msi).Length/1MB, 1)) MB)"
          Write-Host "MSI Package Version: ${{ steps.ver.outputs.msi_version }}"

      - name: Upload MSI to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.ver.outputs.tag }}" `
            "dist\openzro_${{ steps.ver.outputs.version }}_windows_amd64.msi" `
            --repo "${{ github.repository }}" --clobber

  release_pkg:
    name: Build macOS PKG installer (signed + notarized)
    runs-on: macos-14
    # Tag push only — pkgbuild needs the universal CLI + UI tarballs
    # that the `release` and `release_ui_macos` jobs upload to the
    # GitHub Release. Snapshot users get the .tar.gz from artifacts.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [release, release_ui_macos]
    permissions:
      contents: write   # gh release upload
    env:
      # Lifted out of step scope so the codesign / notarize steps'
      # `if: env.APPLE_TEAM_ID != ''` guards can read it. When the
      # secret is empty (early operator, rotated key, fork without
      # signing rights) the signing steps no-op and the pipeline
      # produces an unsigned PKG instead of failing the release.
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          # pkgbuild accepts SemVer-flavoured strings (it stores them
          # verbatim in `pkg-info`'s `version` attribute and only
          # compares them via macOS's looser version-parser, which
          # tolerates pre-release tails). We still emit a `pkg_version`
          # that matches the MSI's dot-numeric form so the release
          # tooling can use one canonical numeric version when
          # publishing to operator-managed channels (e.g.
          # pkg.openzro.io/macos/<arch>/openzro-<pkg_version>.pkg
          # for stable URLs that don't fight the macOS Installer).
          TAG="${GITHUB_REF_NAME}"
          SEMVER="${TAG#v}"
          BASE="${SEMVER%%-*}"
          PRE="${SEMVER#${BASE}}"
          if [ -n "$PRE" ]; then
            REVISION="${PRE##*.}"
            case "$REVISION" in
              ''|*[!0-9]*) REVISION=0 ;;
            esac
          else
            REVISION=0
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${BASE}.${REVISION}" >> "$GITHUB_OUTPUT"

      - name: Stage binaries from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p pkg-stage/usr/local/bin
          mkdir -p pkg-stage/Applications
          mkdir -p downloads

          # CLI tarball: universal binary at the archive root.
          # UI tarball: ships an "openZro UI.app/" directory plus a
          # stub binary at the root (wrap-darwin-app.sh produces
          # both — see scripts/wrap-darwin-app.sh).
          gh release download "${{ steps.ver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'openzro_*_darwin_all.tar.gz' \
            --pattern 'openzro-ui_*_darwin_universal.tar.gz' \
            --dir downloads

          # CLI: extract the binary into /usr/local/bin/.
          tar -xzf downloads/openzro_*_darwin_all.tar.gz \
            -C pkg-stage/usr/local/bin/ openzro
          chmod 0755 pkg-stage/usr/local/bin/openzro

          # UI: extract the .app bundle into /Applications/.
          # Skip the stub binary at the archive root — the .app
          # is the canonical thing macOS users interact with.
          tar -xzf downloads/openzro-ui_*_darwin_universal.tar.gz \
            -C pkg-stage/Applications/ "openZro UI.app"
          chmod 0755 "pkg-stage/Applications/openZro UI.app/Contents/MacOS/openzro-ui"

          ls -la pkg-stage/usr/local/bin/
          ls -la "pkg-stage/Applications/openZro UI.app/Contents/"

      - name: Set up signing keychain
        # Imports the Developer ID Application + Installer .p12 bundles
        # into an ephemeral keychain that lasts for this one CI run. The
        # keychain is partition-listed so codesign / productsign can use
        # the keys without an interactive password prompt.
        #
        # Skipped when APPLE_TEAM_ID is unset: the workflow keeps
        # producing an unsigned PKG (legacy phase-1 behaviour) instead
        # of failing the release, useful while bringing up signing or
        # if the secrets are rotated mid-flight.
        if: ${{ env.APPLE_TEAM_ID != '' }}
        env:
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD:  ${{ secrets.KEYCHAIN_PASSWORD }}
          APP_CERT_B64:       ${{ secrets.APPLE_CERT_APPLICATION_P12_BASE64 }}
          APP_CERT_PW:        ${{ secrets.APPLE_CERT_APPLICATION_PASSWORD }}
          INST_CERT_B64:      ${{ secrets.APPLE_CERT_INSTALLER_P12_BASE64 }}
          INST_CERT_PW:       ${{ secrets.APPLE_CERT_INSTALLER_PASSWORD }}
        run: |
          set -euo pipefail
          KC="build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security default-keychain -s "$KC"
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" "$KC"
          # 6h lifetime — comfortably longer than any sane release run.
          security set-keychain-settings -lut 21600 "$KC"

          echo "$APP_CERT_B64"  | base64 -d > /tmp/app.p12
          echo "$INST_CERT_B64" | base64 -d > /tmp/inst.p12

          security import /tmp/app.p12  -k "$KC" -P "$APP_CERT_PW"  \
            -T /usr/bin/codesign    -T /usr/bin/security
          security import /tmp/inst.p12 -k "$KC" -P "$INST_CERT_PW" \
            -T /usr/bin/productsign -T /usr/bin/security

          # Allow the tools to use the keys without a UI password
          # prompt (which would hang the runner).
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KC"

          rm -f /tmp/app.p12 /tmp/inst.p12

          echo "Imported codesigning identities:"
          security find-identity -v -p codesigning "$KC"
          echo "Imported productsign identities:"
          security find-identity -v -p basic "$KC"

      - name: Codesign CLI binary
        # Hardened Runtime is mandatory for Apple notarization to pass.
        # --timestamp embeds a trusted timestamp so the signature stays
        # valid after the cert eventually expires.
        if: ${{ env.APPLE_TEAM_ID != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          IDENTITY="Developer ID Application: Kleber Rocha (${APPLE_TEAM_ID})"
          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" \
            pkg-stage/usr/local/bin/openzro
          codesign --verify --verbose pkg-stage/usr/local/bin/openzro
          codesign -dvv pkg-stage/usr/local/bin/openzro 2>&1 | head -20

      - name: Codesign UI .app bundle
        # --deep walks the bundle and signs every Mach-O it finds before
        # signing the root, which is what Apple expects for hardened
        # runtime apps with embedded frameworks/helpers. Without --deep
        # any unsigned binary inside Contents/ fails notarization.
        if: ${{ env.APPLE_TEAM_ID != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          IDENTITY="Developer ID Application: Kleber Rocha (${APPLE_TEAM_ID})"
          APP="pkg-stage/Applications/openZro UI.app"
          codesign --force --timestamp --options runtime --deep \
            --sign "$IDENTITY" \
            "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Author postinstall script
        run: |
          set -euo pipefail
          mkdir -p pkg-scripts

          cat > pkg-scripts/postinstall <<'POSTINSTALL'
          #!/bin/bash
          # openZro pkg postinstall — register the daemon via the
          # binary's built-in `service install` (kardianos/service
          # writes a /Library/LaunchDaemons/io.openzro.client.plist).
          # Failures are non-fatal: the package still installs the
          # binaries, the user can run `sudo openzro service install`
          # by hand if anything blocks here.
          set -u
          /usr/local/bin/openzro service install >/dev/null 2>&1 || true
          /usr/local/bin/openzro service start   >/dev/null 2>&1 || true
          exit 0
          POSTINSTALL
          chmod 0755 pkg-scripts/postinstall

      - name: Build PKG via pkgbuild
        run: |
          set -euo pipefail
          PKG="dist/openzro_${{ steps.ver.outputs.version }}_darwin_universal.pkg"
          mkdir -p dist

          # pkgbuild produces a single-component .pkg. The identifier
          # must be reverse-DNS and stable across versions (drives
          # Apple's upgrade-detection on (re)install). The version
          # drives <pkg-info version=…/> in the package — don't
          # include build metadata, just dot-numeric.
          pkgbuild \
            --root pkg-stage \
            --identifier io.openzro.client \
            --version "${{ steps.ver.outputs.version }}" \
            --install-location / \
            --scripts pkg-scripts \
            "$PKG"

          # Sanity-check: the pkg should expand to two binaries.
          pkgutil --payload-files "$PKG" | sort
          ls -lh "$PKG"

      - name: Productsign PKG
        # productsign re-wraps the unsigned .pkg with a Developer ID
        # Installer signature plus an Apple-trusted timestamp. After
        # this step the pkg is signed but not yet notarized — Gatekeeper
        # on macOS 10.15+ requires both signature and notarization.
        if: ${{ env.APPLE_TEAM_ID != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          PKG="dist/openzro_${{ steps.ver.outputs.version }}_darwin_universal.pkg"
          SIGNED="${PKG%.pkg}_signed.pkg"
          IDENTITY="Developer ID Installer: Kleber Rocha (${APPLE_TEAM_ID})"

          productsign --sign "$IDENTITY" --timestamp "$PKG" "$SIGNED"
          mv "$SIGNED" "$PKG"

          pkgutil --check-signature "$PKG"

      - name: Notarize and staple PKG
        # Submits the signed .pkg to Apple's notary service, blocks
        # until status arrives (typically 2-15 minutes), then staples
        # the ticket onto the pkg so Gatekeeper can validate offline.
        # Without stapling each first-install would require a callout
        # to Apple's servers, which fails on air-gapped machines.
        if: ${{ env.APPLE_TEAM_ID != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEY_ID:        ${{ secrets.APPLE_NOTARIZE_API_KEY_ID }}
          ISSUER_ID:     ${{ secrets.APPLE_NOTARIZE_API_ISSUER_ID }}
          KEY_P8_B64:    ${{ secrets.APPLE_NOTARIZE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          PKG="dist/openzro_${{ steps.ver.outputs.version }}_darwin_universal.pkg"

          echo "$KEY_P8_B64" | base64 -d > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8
          trap 'rm -f /tmp/AuthKey.p8' EXIT

          # --wait blocks. Apple's typical SLA is < 15 min; rarely we
          # see 30+ min during incidents. Pipeline timeout (job-level
          # default) is 6h, so even a slow review still completes.
          xcrun notarytool submit "$PKG" \
            --key /tmp/AuthKey.p8 \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --wait \
            --output-format json | tee /tmp/notarize.json

          STATUS=$(jq -r '.status' /tmp/notarize.json)
          if [ "$STATUS" != "Accepted" ]; then
            SUB_ID=$(jq -r '.id' /tmp/notarize.json)
            echo "::error::Notarization rejected (status=$STATUS, id=$SUB_ID). Apple's reasons:"
            xcrun notarytool log "$SUB_ID" \
              --key /tmp/AuthKey.p8 --key-id "$KEY_ID" --issuer "$ISSUER_ID"
            exit 1
          fi

          # Embed the notarization ticket in the pkg so Gatekeeper can
          # validate without a network round-trip.
          xcrun stapler staple "$PKG"
          xcrun stapler validate "$PKG"

          # Final assertion — equivalent of right-clicking the pkg on
          # a clean Mac: "is this trusted?". `spctl --assess` reports
          # source as "Notarized Developer ID" when stapling worked.
          spctl --assess --type install --verbose "$PKG" || true

      - name: Upload PKG to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.ver.outputs.tag }}" \
            "dist/openzro_${{ steps.ver.outputs.version }}_darwin_universal.pkg" \
            --repo "${{ github.repository }}" --clobber

  release_dex:
    name: Build + push themed Dex container image
    runs-on: ubuntu-22.04
    # Same gating as release_dashboard — tag-only, after `release`.
    # Image carries the upstream Dex binary plus the openZro brand
    # theme baked into /srv/dex/web/themes/openzro/. K8s helm chart
    # AND bare-metal Ansible role both consume this; bundling means
    # we ship the theme on a single distribution channel instead of
    # divergent configmap-mount (k8s) + filesystem-stage (Ansible)
    # paths. See docker/Dockerfile.dex for the rationale.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    permissions:
      contents: read
      packages: write   # push to ghcr.io/openzro/dex
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push themed Dex image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dex
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/openzro/dex:${{ steps.ver.outputs.version }}
            ghcr.io/openzro/dex:latest
          labels: |
            org.opencontainers.image.title=openzro-dex
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.source=https://github.com/openzro/openzro
            org.opencontainers.image.licenses=BSD-3-Clause

  release_dashboard:
    name: Build + push dashboard container image
    runs-on: ubuntu-22.04
    # Tag-only — there's no value in re-pushing per snapshot, and
    # the helm chart points at versioned tags. The dashboard image
    # is what `charts/openzro/values.yaml` references via
    # `dashboard.image.repository: ghcr.io/openzro/dashboard`. Without
    # this job, `helm install` against the chart fails with
    # ImagePullBackOff because no tag matching the chart's
    # appVersion exists in ghcr.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    permissions:
      contents: write   # push to ghcr.io/openzro/dashboard AND upload
                        # the openzro-dashboard deb/rpm/pkg.tar.zst to the
                        # GitHub Release (gh release upload). The release
                        # was created by the `release` job; we append.
      packages: write   # push to ghcr.io/openzro/dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install + build dashboard
        # Output goes to dashboard/out/ via Next 15's `output: 'export'`
        # config (see dashboard/next.config.js). The Dockerfile copies
        # this directory into nginx's web root.
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/docker/Dockerfile
          push: true
          # amd64 first; arm64 multi-arch is a follow-up (the static
          # nginx + html bundle works on any arch, so it's a one-line
          # `platforms: linux/amd64,linux/arm64` addition once we
          # confirm the alpine base behaves under QEMU).
          platforms: linux/amd64
          tags: |
            ghcr.io/openzro/dashboard:${{ steps.ver.outputs.version }}
            ghcr.io/openzro/dashboard:latest
          labels: |
            org.opencontainers.image.title=openzro-dashboard
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.source=https://github.com/openzro/openzro
            org.opencontainers.image.licenses=BSD-3-Clause

      # Bare-metal flow: package the same dashboard/out/ static bundle
      # as deb/rpm/archlinux. Operators on Ubuntu/Debian/RHEL/Fedora/
      # Arch can `apt install openzro-dashboard` (or dnf/pacman) and
      # front it with their own nginx — see release_files/dashboard/
      # for the README and example configs.
      - name: Install nfpm
        run: |
          NFPM_VER=2.46.3
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" \
            | tar -xz -C /tmp nfpm
          sudo mv /tmp/nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Build dashboard packages (deb + rpm + archlinux)
        env:
          OPENZRO_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Arch's pkgver can't carry '-' (it splits pkgver from
          # pkgrel). For the archlinux build only, swap the dash
          # for a dot so PKGINFO ends up with `pkgver=0.53.1.alpha.13`
          # — vercmp distinguishes alpha.13 < alpha.14, `pacman -Syu`
          # actually triggers an upgrade. deb and rpm keep the
          # original version (their formats handle '-' natively
          # via '~' / '_' substitution).
          for fmt in deb rpm archlinux; do
            if [ "$fmt" = "archlinux" ]; then
              OPENZRO_VERSION_FORMAT="${OPENZRO_VERSION//-/.}" \
              nfpm package -f nfpm-dashboard.yaml -p "$fmt" -t dist/
            else
              OPENZRO_VERSION_FORMAT="$OPENZRO_VERSION" \
              nfpm package -f nfpm-dashboard.yaml -p "$fmt" -t dist/
            fi
          done
          ls -la dist/

      - name: Upload dashboard packages to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          gh release upload "${{ steps.ver.outputs.tag }}" \
            dist/openzro-dashboard*.deb \
            dist/openzro-dashboard*.rpm \
            dist/openzro-dashboard*.pkg.tar.zst \
            --repo "${{ github.repository }}" --clobber

  publish_packages:
    name: Publish APT/YUM/DNF/zypper repos to pkg.openzro.io
    runs-on: ubuntu-22.04
    # Only on tag push — nothing to publish for snapshot builds, and
    # we want the GitHub Release to exist (with the .deb / .rpm
    # assets attached) before we try to download from it.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # Wait for every job that uploads an asset publish-packages.sh
    # republishes under a stable URL:
    #   release            → CLI .deb/.rpm/.pkg.tar.zst → apt/yum/pacman
    #   release_ui         → UI  .deb/.rpm/.pkg.tar.zst → apt/yum/pacman
    #   release_msi        → openzro_*.msi              → /windows/openzro.msi
    #   release_pkg        → openzro_*.pkg              → /macos/openzro.pkg
    #   release_ui_macos   → openzro-ui_*_darwin_universal.tar.gz
    #                                                   → /macos/openzro-ui.tar.gz
    # Without each of these in `needs:`, publish_packages races the
    # corresponding upload and silently skips it (publish-packages.sh
    # only WARNs when an asset is missing). Empirical proof: alpha.7
    # → .8 left openzro-ui out of pkg.openzro.io/apt because
    # release_ui wasn't a needs.
    needs:
      - release
      - release_ui
      - release_ui_macos
      - release_msi
      - release_pkg
      - release_dashboard
    # Environment-scoped so secrets only resolve for tag pushes from
    # main (matches the protection rule on the `production`
    # environment); also creates a deployment record in the GH UI.
    environment: production

    permissions:
      contents: write   # to push to gh-pages

    steps:
      - name: Checkout main (for the publish-packages.sh script)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install repo build tools
        run: |
          sudo apt-get update
          # `rpm` provides /usr/bin/rpmsign — needed by
          # publish-packages.sh to sign individual .rpm files (the
          # `dnf install` flow's gpgcheck=1 requires per-package
          # signatures, beyond just the repodata signature).
          sudo apt-get install -y -q aptly createrepo-c gnupg rpm

      - name: Build APT + RPM repos
        env:
          VERSION: ${{ github.ref_name }}
          GPG_PRIVATE_KEY: ${{ secrets.PKG_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.PKG_GPG_PASSPHRASE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-packages.sh

      - name: Push to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use a fresh clone in a separate directory rather than a
          # `git worktree add` against the main checkout — orphan
          # worktrees and the actions/checkout extra-header config
          # don't always cooperate with the auth setup that lets us
          # push back. A separate clone is unambiguous.
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads "$REMOTE" gh-pages >/dev/null; then
              git clone --depth 1 --branch gh-pages "$REMOTE" gh-pages-tree
          else
              mkdir gh-pages-tree
              cd gh-pages-tree
              git init -b gh-pages
              git remote add origin "$REMOTE"
              cd ..
          fi

          # Replace pool/dists/repodata in place; preserve any other
          # files an operator may have committed to gh-pages (e.g.
          # CNAME if they configured it manually before the first run).
          rsync -a --delete-after \
              --exclude='.git/' \
              "$GITHUB_WORKSPACE/.pkg-publish/repo/" gh-pages-tree/

          cd gh-pages-tree
          git add -A
          if git diff --cached --quiet; then
              echo "No changes to publish"
              exit 0
          fi
          git -c user.name='openzro-ci' -c user.email='ci@openzro.io' \
              commit -m "publish: ${GITHUB_REF_NAME} packages"
          git push origin gh-pages

      - name: Purge Cloudflare cache for pkg.openzro.io indexes
        # Targeted purge of the index files only — package files are
        # immutable per filename (we never overwrite alpha.X bits) so
        # their cached copies stay valid for the long-TTL window.
        # Skips silently when secrets are not set, so forks without a
        # Cloudflare account don't break the workflow.
        if: env.CF_API_TOKEN != '' && env.CF_ZONE_ID != ''
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          curl -fsSL -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "files": [
                  "https://pkg.openzro.io/apt/dists/stable/InRelease",
                  "https://pkg.openzro.io/apt/dists/stable/Release",
                  "https://pkg.openzro.io/apt/dists/stable/Release.gpg",
                  "https://pkg.openzro.io/apt/dists/stable/main/binary-amd64/Packages",
                  "https://pkg.openzro.io/apt/dists/stable/main/binary-amd64/Packages.gz",
                  "https://pkg.openzro.io/apt/dists/stable/main/binary-arm64/Packages",
                  "https://pkg.openzro.io/apt/dists/stable/main/binary-arm64/Packages.gz",
                  "https://pkg.openzro.io/yum/x86_64/repodata/repomd.xml",
                  "https://pkg.openzro.io/yum/aarch64/repodata/repomd.xml",
                  "https://pkg.openzro.io/pacman/x86_64/openzro.db",
                  "https://pkg.openzro.io/pacman/x86_64/openzro.db.tar.gz",
                  "https://pkg.openzro.io/pacman/x86_64/openzro.files",
                  "https://pkg.openzro.io/pacman/x86_64/openzro.files.tar.gz",
                  "https://pkg.openzro.io/pacman/aarch64/openzro.db",
                  "https://pkg.openzro.io/pacman/aarch64/openzro.db.tar.gz",
                  "https://pkg.openzro.io/pacman/aarch64/openzro.files",
                  "https://pkg.openzro.io/pacman/aarch64/openzro.files.tar.gz",
                  "https://pkg.openzro.io/latest.json"
                ]
              }' \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache"

  publish_aur:
    name: Publish openzro-bin to AUR
    runs-on: ubuntu-22.04
    # Same gate as publish_packages — only fire on real tag pushes
    # after the GitHub Release exists (we read its tarballs to compute
    # sha256sums for the PKGBUILD).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    environment: production

    steps:
      - name: Checkout (for the PKGBUILD template under aur/)
        uses: actions/checkout@v4

      - name: Render PKGBUILD from template
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `github.ref_name` is the tag (e.g. v0.53.1-alpha.1).
          REALVER: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Strip leading 'v' for the upstream version field.
          REALVER="${REALVER#v}"
          # AUR pkgver disallows hyphens — rewrite `-` as `.`.
          PKGVER="${REALVER//-/.}"

          # Pull the linux/amd64 + linux/arm64 tarballs and hash them.
          mkdir -p /tmp/aur
          gh release download "v${REALVER}" \
              --repo openzro/openzro \
              --pattern "openzro_${REALVER}_linux_amd64.tar.gz" \
              --pattern "openzro_${REALVER}_linux_arm64.tar.gz" \
              --dir /tmp/aur

          SHA_AMD64=$(sha256sum "/tmp/aur/openzro_${REALVER}_linux_amd64.tar.gz" | awk '{print $1}')
          SHA_ARM64=$(sha256sum "/tmp/aur/openzro_${REALVER}_linux_arm64.tar.gz" | awk '{print $1}')

          # The deploy-aur action runs in a Docker container that mounts
          # ${GITHUB_WORKSPACE} as /github/workspace. The `pkgbuild:`
          # input must therefore live INSIDE the workspace and be passed
          # as a relative path — absolute paths like /tmp/openzro-bin/
          # aren't visible to the container and break the action with
          # `bash: --command: invalid option`.
          mkdir -p .aur-build/openzro-bin
          sed \
            -e "s/__PKGVER__/${PKGVER}/g" \
            -e "s/__REALVER__/${REALVER}/g" \
            -e "s/__SHA256_X86_64__/${SHA_AMD64}/g" \
            -e "s/__SHA256_AARCH64__/${SHA_ARM64}/g" \
            aur/openzro-bin/PKGBUILD.template \
            > .aur-build/openzro-bin/PKGBUILD

          echo "--- rendered PKGBUILD ---"
          cat .aur-build/openzro-bin/PKGBUILD

      - name: Push openzro-bin to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # AUR push done inline instead of via KSXGitHub/github-
          # actions-deploy-aur — that action's entrypoint passes
          # `bash --command` (bug) and fails with `bash: --command:
          # invalid option` regardless of pkgbuild path. Inline shell
          # is also smaller surface (no third-party action) + every
          # step auditable here.

          # 1. SSH key setup
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            User aur
          EOF
          chmod 600 ~/.ssh/config

          # 2. Clone the AUR repo (already bootstrapped by the
          # maintainer's first manual push)
          rm -rf .aur-clone
          git clone ssh://aur@aur.archlinux.org/openzro-bin.git .aur-clone

          # 3. Copy in the rendered PKGBUILD + regenerate .SRCINFO
          # via an archlinux container (makepkg isn't on ubuntu).
          # The container runs `makepkg --printsrcinfo` as a non-root
          # user (makepkg refuses root). To avoid leaving the host's
          # .git/ chowned to that container UID, we generate .SRCINFO
          # in a SCRATCH dir inside the container and only emit the
          # final output to a host file that we explicitly chown back.
          cp .aur-build/openzro-bin/PKGBUILD .aur-clone/PKGBUILD
          docker run --rm -v "$(pwd)/.aur-clone/PKGBUILD:/tmp/PKGBUILD:ro" \
            archlinux:base bash -c '
              set -e
              pacman -Sy --noconfirm --needed pacman-contrib >/dev/null 2>&1
              useradd -m b
              mkdir -p /tmp/build && cp /tmp/PKGBUILD /tmp/build/
              chown -R b /tmp/build
              su b -c "cd /tmp/build && makepkg --printsrcinfo"
            ' > .aur-clone/.SRCINFO

          # 4. Commit + push
          cd .aur-clone
          git -c user.name=openZro -c user.email=dev@openzro.io \
              add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
              echo "No changes to publish — PKGBUILD is identical to AUR"
              exit 0
          fi
          git -c user.name=openZro -c user.email=dev@openzro.io \
              commit -m "openzro-bin ${REF_NAME}"
          git push origin master

  publish_aur_ui:
    name: Publish openzro-ui-bin to AUR
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [release_ui]
    environment: production

    steps:
      - name: Checkout (for the PKGBUILD template under aur/)
        uses: actions/checkout@v4

      - name: Render PKGBUILD from template
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REALVER: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          REALVER="${REALVER#v}"
          PKGVER="${REALVER//-/.}"

          # UI today is amd64-only on Linux (.goreleaser_ui.yaml builds
          # the GTK binary on a glibc x86_64 base; arm64 builds aren't
          # wired). Arch-specific download + sha pattern reflects that.
          mkdir -p /tmp/aur-ui
          gh release download "v${REALVER}" \
              --repo openzro/openzro \
              --pattern "openzro-ui_${REALVER}_linux_amd64.tar.gz" \
              --dir /tmp/aur-ui

          SHA_AMD64=$(sha256sum "/tmp/aur-ui/openzro-ui_${REALVER}_linux_amd64.tar.gz" | awk '{print $1}')

          mkdir -p .aur-build/openzro-ui-bin
          sed \
            -e "s/__PKGVER__/${PKGVER}/g" \
            -e "s/__REALVER__/${REALVER}/g" \
            -e "s/__SHA256_X86_64__/${SHA_AMD64}/g" \
            aur/openzro-ui-bin/PKGBUILD.template \
            > .aur-build/openzro-ui-bin/PKGBUILD

          echo "--- rendered PKGBUILD ---"
          cat .aur-build/openzro-ui-bin/PKGBUILD

      - name: Push openzro-ui-bin to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Same inline-shell pattern as publish_aur (above) — see that
          # step's comment for why we don't use the third-party action.

          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            User aur
          EOF
          chmod 600 ~/.ssh/config

          rm -rf .aur-clone-ui
          git clone ssh://aur@aur.archlinux.org/openzro-ui-bin.git .aur-clone-ui

          cp .aur-build/openzro-ui-bin/PKGBUILD .aur-clone-ui/PKGBUILD
          docker run --rm -v "$(pwd)/.aur-clone-ui/PKGBUILD:/tmp/PKGBUILD:ro" \
            archlinux:base bash -c '
              set -e
              pacman -Sy --noconfirm --needed pacman-contrib >/dev/null 2>&1
              useradd -m b
              mkdir -p /tmp/build && cp /tmp/PKGBUILD /tmp/build/
              chown -R b /tmp/build
              su b -c "cd /tmp/build && makepkg --printsrcinfo"
            ' > .aur-clone-ui/.SRCINFO

          cd .aur-clone-ui
          git -c user.name=openZro -c user.email=dev@openzro.io \
              add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
              echo "No changes to publish — PKGBUILD is identical to AUR"
              exit 0
          fi
          git -c user.name=openZro -c user.email=dev@openzro.io \
              commit -m "openzro-ui-bin ${REF_NAME}"
          git push origin master
